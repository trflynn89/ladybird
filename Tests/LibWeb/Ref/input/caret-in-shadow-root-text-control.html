<!DOCTYPE html>
<link rel="match" href="../expected/caret-in-shadow-root-text-control-ref.html">
<div id="host"></div>
<script>
const shadowRoot = document.getElementById("host").attachShadow({ mode: "open" });
shadowRoot.innerHTML = `
    <style>
    textarea {
        font-size: 20px;
        width: 200px;
        outline: none;
    }
    </style>
    <textarea></textarea>`;
shadowRoot.querySelector("textarea").focus();
</script>
