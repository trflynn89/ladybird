<!DOCTYPE html>
<meta charset="utf-8">
<script src="../../include.js"></script>
<script src="structural-matrix.js"></script>
<script>
    test(() => {
        const host = makeElement("div");
        document.body.appendChild(host);
        const shadowRoot = host.attachShadow({ mode: "open" });
        const slot = document.createElement("slot");
        shadowRoot.appendChild(slot);
        const slotted = makeElement("div");
        host.appendChild(slotted);
        document.body.offsetWidth;

        resetStyleCounters();
        assertEqual("slot matches ::slotted", slot.matches("::slotted(:has(.hit))"), false);
        printPassWithCounters("matching ::slotted() against a shadow tree slot");

        resetStyleCounters();
        assertEqual("slotted element matches ::slotted", slotted.matches("::slotted(:has(.hit))"), false);
        printPassWithCounters("matching ::slotted() against a slotted element");

        host.remove();
    });
</script>
