<!DOCTYPE html>
<style>
    div {
        display: grid;
        grid-template-columns: max-content;
        width: max-content;
    }

    img {
        max-height: 32px;
    }

    .cyclic-preferred {
        width: 50%;
    }

    .cyclic-calculated-preferred {
        width: calc(10px + 50%);
    }

    .fixed-preferred {
        width: 80px;
    }

    .calculated-preferred {
        width: calc(80px);
    }

    .transferred-minimum {
        min-height: 100px;
    }

    .cyclic-calculated-transferred-minimum {
        min-height: calc(10px + 50%);
    }

    .capped-transferred-minimum {
        min-height: 100px;
        max-width: 150px;
    }

    .calculated-capped-transferred-minimum {
        min-height: 100px;
        max-width: calc(150px);
    }

    .cyclic-maximum {
        min-height: 100px;
        max-width: 50%;
    }

    .cyclic-minimum {
        min-width: calc(10px + 50%);
        max-height: 2px;
    }

    .cyclic-zero-minimum {
        min-width: 50%;
    }

    .cyclic-zero-calculated-minimum {
        min-width: calc(0px + 50%);
    }

    .calculated-minimum {
        min-width: calc(80px);
    }

    .fixed-minimum-only,
    .calculated-minimum-only {
        max-height: none;
        min-height: 100px;
    }

    .calculated-minimum-only {
        min-height: calc(100px);
    }

    .border-box-maximum {
        box-sizing: border-box;
        border: 10px solid black;
        max-height: calc(52px);
    }

    .definite-height {
        align-items: start;
        height: 100px;
    }

    .percentage-maximum {
        max-height: 50%;
    }

    .available-width {
        width: auto;
    }
</style>
